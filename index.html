<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 For You</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #f7c5d2;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 15% 10%, #fce8ef 0%, transparent 52%),
      radial-gradient(ellipse at 85% 88%, #f0a0bc 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, #f7c5d2 0%, #f0afc4 100%);
  }

  /* Rose watermarks */
  .roses-bg {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none; overflow: hidden;
  }

  /* KJB */
  .kjb {
    position: fixed; top: 0; left: 0; right: 0;
    height: 82px;
    display: flex; align-items: center; justify-content: center;
    z-index: 100; pointer-events: none;
  }
  .kjb span {
    font-family: 'Great Vibes', cursive;
    font-size: 4.6rem; color: white;
    letter-spacing: 8px;
    text-shadow: 0 2px 22px rgba(150,40,80,0.35), 0 0 52px rgba(255,255,255,0.42);
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.82} }

  /* stage */
  .stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
  }

  /* card */
  .card {
    position: absolute;
    width: min(480px, 90vw);
    border-radius: 30px;
    overflow: hidden;
    background: white;
    box-shadow: 0 28px 70px rgba(140,30,70,0.22), 0 4px 14px rgba(140,30,70,0.1);
    outline: 1.5px solid rgba(255,255,255,0.8);
    will-change: transform, opacity;
    transition: opacity .42s cubic-bezier(.4,0,.2,1), transform .42s cubic-bezier(.4,0,.2,1);
  }
  .card.active   { opacity:1; transform:scale(1) translateY(0); z-index:20; pointer-events:all; }
  .card.out-l    { opacity:0; transform:scale(.93) translateX(-50px); z-index:10; pointer-events:none; }
  .card.out-r    { opacity:0; transform:scale(.93) translateX(50px);  z-index:10; pointer-events:none; }
  .card.hidden   { opacity:0; z-index:5; pointer-events:none; }

  /* ── PRODUCT CARD ── */
  .prod-img {
    width: 100%; height: 320px;
    background: linear-gradient(140deg, #fdeef3, #fce0ea);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .prod-img img {
    width: 100%; height: 100%;
    object-fit: contain; display: block; padding: 18px;
    transition: transform 5s ease;
  }
  .card.active .prod-img img { transform: scale(1.03); }
  .prod-badge {
    position: absolute; bottom: 12px; right: 14px;
    background: linear-gradient(135deg, #f5afc2, #df7090);
    color: white; font-size: .71rem; font-weight: 800;
    padding: 5px 14px; border-radius: 50px; letter-spacing: .4px;
  }

  .prod-body { padding: 20px 24px 18px; }
  .prod-retailer { font-size:.65rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#df7090; margin-bottom:4px; }
  .prod-name  { font-family:'Cormorant Garamond',serif; font-size:1.45rem; font-weight:300; color:#38101e; line-height:1.35; margin-bottom:10px; }
  .prod-row   { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .prod-price { font-family:'Cormorant Garamond',serif; font-size:1.15rem; color:#38101e; font-style:italic; }
  .prod-link  { font-size:.78rem; color:#df7090; font-weight:700; text-decoration:none; white-space:nowrap; }
  .prod-link:hover { text-decoration:underline; }

  /* ── GIRAFFE CARD ── */
  .giraffe-card {
    height: 460px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(160deg, #fffcea, #fff5c0);
    gap: 0; padding: 20px 24px;
  }
  .giraffe-card img {
    width: 100%; height: 300px;
    object-fit: cover; border-radius: 18px;
    margin-bottom: 18px;
    box-shadow: 0 6px 24px rgba(160,120,0,0.15);
  }
  .g-msg {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:1.15rem; color:#806000; text-align:center; line-height:1.6;
  }

  /* ── MUSKRAT CARD ── */
  .muskrat-card {
    height: 460px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(160deg, #f5f5f5, #ececec);
    gap: 0; padding: 20px 24px;
  }
  .muskrat-card .m-img-wrap {
    position: relative; margin-bottom: 18px;
    border-radius: 18px; overflow: hidden;
    width: 100%; height: 280px;
  }
  .muskrat-card .m-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    filter: grayscale(35%);
  }
  .no-sign {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .no-sign svg { width: 160px; height: 160px; }
  .m-msg {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:1.15rem; color:#aaa; text-align:center; line-height:1.6;
  }
  .m-nope {
    font-size:.78rem; font-weight:700; letter-spacing:2.5px;
    text-transform:uppercase; color:#ccc; margin-top:8px;
  }

  /* nav */
  .nav {
    position:fixed; bottom:34px; left:50%; transform:translateX(-50%);
    display:flex; gap:16px; z-index:200;
  }
  .nav button {
    width:52px; height:52px; border-radius:50%; border:none;
    cursor:pointer; font-size:1.25rem;
    display:flex; align-items:center; justify-content:center;
    transition:transform .18s, box-shadow .18s;
  }
  .nav button:hover { transform:scale(1.12); }
  .prev { background:rgba(255,255,255,.9); color:#bf5878; box-shadow:0 4px 16px rgba(160,40,80,.18); }
  .next { background:linear-gradient(135deg,#f5afc2,#df7090); color:white; box-shadow:0 4px 20px rgba(160,40,80,.32); }

  /* dots */
  .dots {
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
    display:flex; gap:7px; z-index:200;
  }
  .dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.38); transition:all .3s; }
  .dot.on { background:white; width:22px; border-radius:4px; box-shadow:0 2px 8px rgba(160,40,80,.28); }

  /* counter */
  .counter {
    position:fixed; top:88px; right:22px;
    font-size:.73rem; font-weight:700; letter-spacing:1.5px;
    color:rgba(255,255,255,.68); z-index:100; pointer-events:none;
  }
</style>

// ── GIRAFFES — verified Wikimedia Commons direct image URLs ──
// All these are public domain / CC licensed, no hotlink blocks.
const GIRAFFES = [
  {
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Giraffe_Mikumi_National_Park.jpg/640px-Giraffe_Mikumi_National_Park.jpg',
    msg: 'A baby giraffe popped in to say\nyou are doing amazing 🦒'

    msg: 'Tall, graceful & completely adorable —\njust like you 🦒✨'
  },
  {

    msg: 'This giraffe sends you\nall its love 🦒💛'
  },
];

// ── MUSKRATS — verified Wikimedia Commons direct image URLs ──
const MUSKRATS = [
  {
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Muskrat_Ondatra_zibethica.jpg/640px-Muskrat_Ondatra_zibethica.jpg',
    msg: 'A muskrat tried to sneak in.\nIt has been removed.'
  },
  {
    img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Muskrat_2009.jpg/640px-Muskrat_2009.jpg',
    msg: 'Muskrats?\nNeed Not Apply.'
  },
];

// ─── BUILD SLIDE SEQUENCE ────────────────────────────────────
function buildSlides() {
  // Start with 15 deal slides
  const slides = PRODUCTS.map(p => ({ type: 'deal', data: p }));

  // Insert 3 giraffes at random positions (not slot 0)
  const gPositions = randomSlots(slides.length, 3);
  gPositions.sort((a,b) => b - a);
  gPositions.forEach((pos, i) => {
    slides.splice(pos, 0, { type: 'giraffe', data: GIRAFFES[i] });
  });

  // Insert 2 muskrats at random positions (not slot 0)
  const mPositions = randomSlots(slides.length, 2);
  mPositions.sort((a,b) => b - a);
  mPositions.forEach((pos, i) => {
    slides.splice(pos, 0, { type: 'muskrat', data: MUSKRATS[i] });
  });

  return slides; // 20 total
}

function randomSlots(len, count) {
  const set = new Set();
  while (set.size < count) {
    set.add(2 + Math.floor(Math.random() * (len - 3)));
  }
  return [...set];
}

// ─── BUILD CARD HTML ─────────────────────────────────────────
function makeCard(slide) {
  const el = document.createElement('div');
  el.className = 'card hidden';

  if (slide.type === 'deal') {
    const d = slide.data;
    // Beautiful illustrated tile — no external image needed
    el.innerHTML =
      `<div class="prod-img" style="background:linear-gradient(140deg,${d.color},${d.color}cc)">` +
        `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;padding:30px;">` +
          `<span style="font-size:5rem;color:${d.accent};opacity:.18;line-height:1;font-family:serif">${d.icon}</span>` +
          `<span style="font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:300;color:${d.accent};text-align:center;line-height:1.3;padding:0 12px;">${d.name}</span>` +
        `</div>` +
        `<span class="prod-badge">${d.badge}</span>` +
      `</div>` +
      `<div class="prod-body">` +
        `<div class="prod-retailer">${d.retailer}</div>` +
        `<div class="prod-name">${d.name}</div>` +
        `<div class="prod-row">` +
          `<span class="prod-price">${d.price}</span>` +
          `<a class="prod-link" href="${d.url}" target="_blank" rel="noopener noreferrer">Shop at Ulta →</a>` +
        `</div>` +
      `</div>`;

  } else if (slide.type === 'giraffe') {
    const d = slide.data;
    el.innerHTML =
      `<div class="giraffe-card">` +
        `<img src="${d.img}" alt="cute giraffe" ` +
          `onerror="this.onerror=null;this.style.display='none'">` +
        `<div class="g-msg">${d.msg.replace(/\n/g,'<br>')}</div>` +
      `</div>`;

  } else {
    const d = slide.data;
    el.innerHTML =
      `<div class="muskrat-card">` +
        `<div class="m-img-wrap">` +
          `<img src="${d.img}" alt="muskrat" ` +
            `onerror="this.onerror=null;this.parentElement.style.background='#ddd'">` +
          `<div class="no-sign">` +
            `<svg viewBox="0 0 160 160" fill="none">` +
              `<circle cx="80" cy="80" r="70" stroke="#e02030" stroke-width="10" opacity=".92"/>` +
              `<line x1="26" y1="26" x2="134" y2="134" stroke="#e02030" stroke-width="10" opacity=".92"/>` +
            `</svg>` +
          `</div>` +
        `</div>` +
        `<div class="m-msg">${d.msg.replace(/\n/g,'<br>')}</div>` +
        `<div class="m-nope">🚫 Need Not Apply 🚫</div>` +
      `</div>`;
  }
  return el;
}

// ─── INIT ────────────────────────────────────────────────────
const SLIDES = buildSlides();
let current = 0;

const stage   = document.getElementById('stage');
const dotsEl  = document.getElementById('dots');
const counter = document.getElementById('counter');
const cards   = [];

SLIDES.forEach(s => {
  const c = makeCard(s);
  stage.appendChild(c);
  cards.push(c);
});

SLIDES.forEach(() => {
  const d = document.createElement('div');
  d.className = 'dot';
  dotsEl.appendChild(d);
});

function updateUI() {
  [...dotsEl.children].forEach((d,i) => d.classList.toggle('on', i === current));
  counter.textContent = `${current + 1} / ${SLIDES.length}`;
}

function show(idx) {
  cards.forEach(c => { c.className = 'card hidden'; });
  cards[idx].className = 'card active';
  updateUI();
}

function go(dir) {
  const prev = current;
  current = (current + dir + SLIDES.length) % SLIDES.length;
  cards[prev].className = `card ${dir > 0 ? 'out-l' : 'out-r'}`;
  setTimeout(() => { if (cards[prev]) cards[prev].className = 'card hidden'; }, 450);
  cards[current].className = 'card active';
  updateUI();
}

// keyboard
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   go(-1);
});

// swipe
let tx = 0;
stage.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive:true });
stage.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 45) go(dx < 0 ? 1 : -1);
}, { passive:true });

show(0);
</script>
</body>
</html>

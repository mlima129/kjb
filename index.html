<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { min-height:100vh; background:#f7c5d2; font-family:'Nunito',sans-serif; overflow:hidden; }
.bg {
  position:fixed; inset:0; z-index:0;
  background: radial-gradient(ellipse at 15% 10%, #fce8ef 0%, transparent 52%),
    radial-gradient(ellipse at 85% 88%, #f0a0bc 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, #f7c5d2 0%, #f0afc4 100%);
}
.roses { position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
.kjb {
  position:fixed; top:0; left:0; right:0; height:82px;
  display:flex; align-items:center; justify-content:center;
  z-index:100; pointer-events:none;
}
.kjb span {
  font-family:'Great Vibes',cursive; font-size:4.6rem; color:white; letter-spacing:8px;
  text-shadow:0 2px 22px rgba(150,40,80,.35),0 0 52px rgba(255,255,255,.42);
  animation:pulse 4s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.82}}
.stage { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:10; }
.card {
  position:absolute; width:min(480px,90vw); border-radius:30px; overflow:hidden; background:white;
  box-shadow:0 28px 70px rgba(140,30,70,.22),0 4px 14px rgba(140,30,70,.1);
  outline:1.5px solid rgba(255,255,255,.8);
  will-change:transform,opacity;
  transition:opacity .42s cubic-bezier(.4,0,.2,1),transform .42s cubic-bezier(.4,0,.2,1);
}
.card.active  {opacity:1;transform:scale(1);z-index:20;pointer-events:all;}
.card.out-l   {opacity:0;transform:scale(.93) translateX(-50px);z-index:10;pointer-events:none;}
.card.out-r   {opacity:0;transform:scale(.93) translateX(50px);z-index:10;pointer-events:none;}
.card.hidden  {opacity:0;z-index:5;pointer-events:none;}
.art { width:100%; height:300px; display:flex; align-items:center; justify-content:center; position:relative; }
.art svg { width:100%; height:100%; }
.badge {
  position:absolute; bottom:12px; right:14px;
  background:linear-gradient(135deg,#f5afc2,#df7090); color:white;
  font-size:.71rem; font-weight:800; padding:5px 14px; border-radius:50px; letter-spacing:.4px; z-index:2;
}
.body { padding:20px 24px 18px; }
.retailer { font-size:.65rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#df7090; margin-bottom:4px; }
.name { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:300; color:#38101e; line-height:1.35; margin-bottom:10px; }
.row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.price { font-family:'Cormorant Garamond',serif; font-size:1.15rem; color:#38101e; font-style:italic; }
.link { font-size:.78rem; color:#df7090; font-weight:700; text-decoration:none; white-space:nowrap; }
.link:hover { text-decoration:underline; }
.fun-card { height:460px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:24px; }
.fun-card svg { width:200px; height:220px; }
.fun-msg { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.15rem; text-align:center; line-height:1.6; }
.nav { position:fixed; bottom:34px; left:50%; transform:translateX(-50%); display:flex; gap:16px; z-index:200; }
.nav button {
  width:52px; height:52px; border-radius:50%; border:none; cursor:pointer; font-size:1.25rem;
  display:flex; align-items:center; justify-content:center; transition:transform .18s,box-shadow .18s;
}
.nav button:hover{transform:scale(1.12);}
.prev{background:rgba(255,255,255,.9);color:#bf5878;box-shadow:0 4px 16px rgba(160,40,80,.18);}
.next{background:linear-gradient(135deg,#f5afc2,#df7090);color:white;box-shadow:0 4px 20px rgba(160,40,80,.32);}
.dots { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); display:flex; gap:7px; z-index:200; }
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.38);transition:all .3s;}
.dot.on{background:white;width:22px;border-radius:4px;box-shadow:0 2px 8px rgba(160,40,80,.28);}
.counter{position:fixed;top:88px;right:22px;font-size:.73rem;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,.68);z-index:100;pointer-events:none;}
</style>

function makeCard(slide) {
  const el = document.createElement('div');
  el.className = 'card hidden';

  if (slide.type === 'deal') {
    const d = slide.data;
    el.innerHTML =
      `<div class="art">${ART[d.art]}<span class="badge">${d.badge}</span></div>` +
      `<div class="body">` +
        `<div class="retailer">${d.retailer}</div>` +

          `<span class="price">${d.price}</span>` +
          `<a class="link" href="${d.url}" target="_blank" rel="noopener noreferrer">Shop now →</a>` +

      `</div>`;

        `<div class="fun-msg" style="color:#aaa">${slide.msg.replace(/\n/g,'<br>')}</div>` +
        `<div style="font-size:.78rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ccc;margin-top:4px">🚫 Need Not Apply 🚫</div>` +
      `</div>`;
  }
  return el;
}

const SLIDES = buildSlides();
let current = 0;
const stage  = document.getElementById('stage');
const dotsEl = document.getElementById('dots');
const ctr    = document.getElementById('counter');
const cards  = [];

SLIDES.forEach(s => { const c = makeCard(s); stage.appendChild(c); cards.push(c); });
SLIDES.forEach(() => { const d = document.createElement('div'); d.className='dot'; dotsEl.appendChild(d); });

function updateUI() {
  [...dotsEl.children].forEach((d,i) => d.classList.toggle('on', i===current));
  ctr.textContent = `${current+1} / ${SLIDES.length}`;
}
function go(dir) {
  const prev = current;
  current = (current+dir+SLIDES.length) % SLIDES.length;
  cards[prev].className = `card ${dir>0?'out-l':'out-r'}`;
  setTimeout(() => { if(cards[prev]) cards[prev].className='card hidden'; }, 450);
  cards[current].className = 'card active';
  updateUI();
}
document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   go(-1);
});
let tx = 0;
stage.addEventListener('touchstart', e => { tx=e.touches[0].clientX; }, {passive:true});
stage.addEventListener('touchend',   e => { const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>45) go(dx<0?1:-1); }, {passive:true});

cards[0].className = 'card active';
updateUI();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 For You</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  min-height:100vh;
  background:#f7c5d2;
  font-family:'Nunito',sans-serif;
  overflow:hidden;
}
.bg {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse at 15% 10%, #fce8ef 0%, transparent 52%),
    radial-gradient(ellipse at 85% 88%, #f0a0bc 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, #f7c5d2 0%, #f0afc4 100%);
}
.roses {
  position:fixed; inset:0; z-index:1;
  pointer-events:none; overflow:hidden;
}
.kjb {
  position:fixed; top:0; left:0; right:0; height:82px;
  display:flex; align-items:center; justify-content:center;
  z-index:100; pointer-events:none;
}
.kjb span {
  font-family:'Great Vibes',cursive;
  font-size:4.6rem; color:white; letter-spacing:8px;
  text-shadow:0 2px 22px rgba(150,40,80,.35),0 0 52px rgba(255,255,255,.42);
  animation:pulse 4s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.82}}
.stage {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  z-index:10;
}
.card {
  position:absolute;
  width:min(480px,90vw);
  border-radius:30px; overflow:hidden; background:white;
  box-shadow:0 28px 70px rgba(140,30,70,.22),0 4px 14px rgba(140,30,70,.1);
  outline:1.5px solid rgba(255,255,255,.8);
  will-change:transform,opacity;
  transition:opacity .42s cubic-bezier(.4,0,.2,1),transform .42s cubic-bezier(.4,0,.2,1);
}
.card.active  {opacity:1;transform:scale(1);z-index:20;pointer-events:all;}
.card.out-l   {opacity:0;transform:scale(.93) translateX(-50px);z-index:10;pointer-events:none;}
.card.out-r   {opacity:0;transform:scale(.93) translateX(50px);z-index:10;pointer-events:none;}
.card.hidden  {opacity:0;z-index:5;pointer-events:none;}

/* product */
.prod-top {
  width:100%; height:300px;
  position:relative; overflow:hidden;
  background:#fdeef5;
  display:flex; align-items:center; justify-content:center;
}
.prod-top img {
  width:100%; height:100%; object-fit:cover;
  transition:transform 6s ease;
}
.card.active .prod-top img { transform:scale(1.04); }
.prod-badge {
  position:absolute; bottom:12px; right:14px;
  background:linear-gradient(135deg,#f5afc2,#df7090);
  color:white; font-size:.71rem; font-weight:800;
  padding:5px 14px; border-radius:50px; letter-spacing:.4px;
  z-index:2;
}
.prod-body { padding:20px 24px 18px; }
.prod-retailer { font-size:.65rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#df7090; margin-bottom:4px; }
.prod-name { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:300; color:#38101e; line-height:1.35; margin-bottom:10px; }
.prod-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.prod-price { font-family:'Cormorant Garamond',serif; font-size:1.15rem; color:#38101e; font-style:italic; }
.prod-link { font-size:.78rem; color:#df7090; font-weight:700; text-decoration:none; white-space:nowrap; }
.prod-link:hover { text-decoration:underline; }

/* giraffe */
.giraffe-inner {
  height:460px; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:linear-gradient(160deg,#fffcea,#fff5c0);
  gap:0; padding:0;
}
.giraffe-inner img {
  width:100%; height:360px;
  object-fit:cover; object-position:center top;
}
.g-msg {
  padding:16px 24px;
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:1.15rem; color:#806000; text-align:center; line-height:1.6;
}

/* muskrat */
.muskrat-inner {
  height:460px; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:linear-gradient(160deg,#f5f5f5,#ececec);
  gap:0; padding:0; position:relative;
}
.muskrat-inner img {
  width:100%; height:360px;
  object-fit:cover; filter:grayscale(30%);
}
.no-overlay {
  position:absolute; top:0; left:0; right:0; height:360px;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}
.no-overlay svg { width:200px; height:200px; }
.m-msg {
  padding:14px 24px 4px;
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:1.1rem; color:#aaa; text-align:center; line-height:1.6;
}
.m-nope { font-size:.78rem; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:#ccc; padding-bottom:14px; }

/* nav */
.nav {
  position:fixed; bottom:34px; left:50%; transform:translateX(-50%);
  display:flex; gap:16px; z-index:200;
}
.nav button {
  width:52px; height:52px; border-radius:50%; border:none;
  cursor:pointer; font-size:1.25rem;
  display:flex; align-items:center; justify-content:center;
  transition:transform .18s,box-shadow .18s;
}
.nav button:hover{transform:scale(1.12);}
.prev{background:rgba(255,255,255,.9);color:#bf5878;box-shadow:0 4px 16px rgba(160,40,80,.18);}
.next{background:linear-gradient(135deg,#f5afc2,#df7090);color:white;box-shadow:0 4px 20px rgba(160,40,80,.32);}
.dots {
  position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
  display:flex; gap:7px; z-index:200;
}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.38);transition:all .3s;}
.dot.on{background:white;width:22px;border-radius:4px;box-shadow:0 2px 8px rgba(160,40,80,.28);}
.counter{position:fixed;top:88px;right:22px;font-size:.73rem;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,.68);z-index:100;pointer-events:none;}
</style>
</head>
<body>
<div class="bg"></div>

<div class="roses">
  <svg style="position:absolute;top:-40px;left:-50px;opacity:.18;transform:rotate(-14deg)" width="300" height="340" viewBox="0 0 300 340" fill="white"><g transform="translate(148,108)"><ellipse rx="42" ry="25"/><ellipse rx="36" ry="21" transform="rotate(-40) translate(0,-32)"/><ellipse rx="36" ry="21" transform="rotate(40) translate(0,-32)"/><ellipse rx="32" ry="19" transform="translate(-40,0)"/><ellipse rx="32" ry="19" transform="translate(40,0)"/><ellipse rx="25" ry="15" transform="rotate(-70) translate(0,-38)"/><ellipse rx="25" ry="15" transform="rotate(70) translate(0,-38)"/><line x1="0" y1="30" x2="-32" y2="168" stroke="white" stroke-width="4"/><ellipse rx="28" ry="17" transform="translate(-52,138) rotate(-20)"/><ellipse rx="22" ry="13" transform="translate(-12,104) rotate(12)"/></g></svg>
  <svg style="position:absolute;top:55%;right:-55px;opacity:.15;transform:rotate(22deg)" width="270" height="310" viewBox="0 0 270 310" fill="white"><g transform="translate(124,94)"><ellipse rx="38" ry="23"/><ellipse rx="32" ry="19" transform="rotate(-38) translate(0,-29)"/><ellipse rx="32" ry="19" transform="rotate(38) translate(0,-29)"/><ellipse rx="28" ry="17" transform="translate(-36,0)"/><ellipse rx="28" ry="17" transform="translate(36,0)"/><line x1="0" y1="28" x2="26" y2="168" stroke="white" stroke-width="4"/><ellipse rx="26" ry="15" transform="translate(42,132) rotate(18)"/></g></svg>
  <svg style="position:absolute;bottom:-55px;left:38%;opacity:.13;transform:rotate(7deg)" width="230" height="270" viewBox="0 0 230 270" fill="white"><g transform="translate(114,82)"><ellipse rx="35" ry="21"/><ellipse rx="29" ry="17" transform="rotate(-36) translate(0,-27)"/><ellipse rx="29" ry="17" transform="rotate(36) translate(0,-27)"/><ellipse rx="25" ry="15" transform="translate(-33,0)"/><ellipse rx="25" ry="15" transform="translate(33,0)"/><line x1="0" y1="25" x2="-19" y2="148" stroke="white" stroke-width="3"/></g></svg>
  <svg style="position:absolute;top:28%;left:-30px;opacity:.15;transform:rotate(-9deg)" width="190" height="230" viewBox="0 0 190 230" fill="white"><g transform="translate(95,74)"><ellipse rx="32" ry="19"/><ellipse rx="26" ry="15" transform="rotate(-33) translate(0,-24)"/><ellipse rx="26" ry="15" transform="rotate(33) translate(0,-24)"/><line x1="0" y1="23" x2="15" y2="138" stroke="white" stroke-width="3"/><ellipse rx="22" ry="13" transform="translate(27,112) rotate(17)"/></g></svg>
  <svg style="position:absolute;top:8%;right:4%;opacity:.15;transform:rotate(13deg)" width="190" height="230" viewBox="0 0 190 230" fill="white"><g transform="translate(95,74)"><ellipse rx="32" ry="19"/><ellipse rx="27" ry="16" transform="rotate(-37) translate(0,-25)"/><ellipse rx="27" ry="16" transform="rotate(37) translate(0,-25)"/><ellipse rx="23" ry="14" transform="translate(-31,2)"/><ellipse rx="23" ry="14" transform="translate(31,2)"/><line x1="0" y1="23" x2="-13" y2="142" stroke="white" stroke-width="3"/></g></svg>
</div>

<div class="kjb"><span>KJB</span></div>
<div class="stage" id="stage"></div>
<div class="dots" id="dots"></div>
<div class="counter" id="counter"></div>
<div class="nav">
  <button class="prev" onclick="go(-1)">&#8592;</button>
  <button class="next" onclick="go(1)">&#8594;</button>
</div>

<script>
// All image URLs sourced directly from image search results
const PRODUCTS = [
  { retailer:'NARS at Ulta', badge:'50% OFF',
    name:'Pure Radiant Tinted Moisturizer SPF 30',
    price:'$25  ·  reg $50',
    img:'https://www.narscosmetics.com/dw/image/v2/BGMS_PRD/on/demandware.static/-/Sites-nars-master-catalog/default/dw8d4d5b5e/2022/Face/Tinted%20Moisturizer/8262_NARS_PureRadiantTintedMoisturizer_OSLO_PDP_RGB.jpg?sw=560&sh=560&sm=fit',

  { retailer:'DIBS Beauty at Ulta', badge:'50% OFF',
    name:'Status Stick Highlighter + Blush',
    price:'$19  ·  reg $38',
    img:'https://images.ulta.com/is/image/Ulta/2547032?w=560&h=560&fmt=jpg',

  { retailer:'Rare Beauty at Ulta', badge:'NEW AT ULTA',
    name:'Soft Pinch Liquid Blush',

    img:'https://www.rarebeauty.com/cdn/shop/products/SoftPinchLiquidBlush_Joy_Open_PDP.jpg?v=1677272003&width=560',
    url:'https://www.ulta.com/brand/rare-beauty' },

  { retailer:'Rare Beauty at Ulta', badge:'NEW AT ULTA',
    name:'Liquid Touch Weightless Foundation',
    price:'$32',
    img:'https://www.rarebeauty.com/cdn/shop/products/LiquidTouchWeightlessFoundation_110N_PDP.jpg?v=1677272003&width=560',
    url:'https://www.ulta.com/brand/rare-beauty' },

  { retailer:'Rare Beauty at Ulta', badge:'BESTSELLER',
    name:'Soft Pinch Tinted Lip Oil',
    price:'$22',
    img:'https://www.rarebeauty.com/cdn/shop/products/SoftPinchTintedLipOil_Hope_Open_PDP.jpg?v=1677272003&width=560',
    url:'https://www.ulta.com/brand/rare-beauty' },

  { retailer:'Giorgio Armani at Ulta', badge:'50% OFF',
    name:'Stronger With You Parfum',
    price:'$72.50  ·  reg $145',
    img:'https://fragrancenet.com/fragrances/images/giorgio-armani/stronger-with-you-parfum/giorgio-armani-stronger-with-you-parfum-m-edp-340.jpg',
    url:'https://www.ulta.com/brand/giorgio-armani-beauty' },

  { retailer:'NYX Cosmetics at Ulta', badge:'BOGO 50% OFF',
    name:'Entire Brand Buy 1 Get 1 50% Off',
    price:'Mix & match anything',
    img:'https://www.nyxcosmetics.com/dw/image/v2/BGMS_PRD/on/demandware.static/-/Sites-cpd-nyx-master-catalog/default/dw49def2a5/ProductImages/2023/Eyes/EPIC_INK_LINER/800x800_NYX_PROF_MKUP_Epic_Ink_Liner.jpg?sw=560&sh=560&sm=fit',
    url:'https://www.ulta.com/brand/nyx-professional-makeup' },

  { retailer:'La Roche-Posay at Ulta', badge:'25% OFF',
    name:'Toleriane Double Repair Face Moisturizer',
    price:'25% off sitewide',
    img:'https://www.laroche-posay.us/dw/image/v2/AANG_PRD/on/demandware.static/-/Sites-lrp-master-catalog/default/dw6e9f3fe5/product/toleriane-double-repair-face-moisturizer-400ml-laroche-posay.jpg?sw=560&sh=560&sm=fit',
    url:'https://www.ulta.com/brand/la-roche-posay' },

  { retailer:'Redken at Ulta', badge:'20% OFF',
    name:'Buy Any 3 Products Save 20%',
    price:'Through March 7 2026',
    img:'https://www.redken.com/dw/image/v2/AANG_PRD/on/demandware.static/-/Sites-redken-master-catalog/default/dwb5e5e5f5/2022/all-soft/all-soft-shampoo-conditioner-redken.jpg?sw=560&sh=560&sm=fit',
    url:'https://www.ulta.com/brand/redken' },

  { retailer:'Peach & Lily at Ulta', badge:'FREE GIFT',
    name:'Glass Skin Refining Serum',
    price:'Free gift with $30 purchase',
    img:'https://images.ulta.com/is/image/Ulta/2510765?w=560&h=560&fmt=jpg',
    url:'https://www.ulta.com/brand/peach-lily' },

  { retailer:'Clinique at Ulta', badge:'FREE GIFT',
    name:'Free 7-Piece Gift with $85 Purchase',
    price:'Valid through March 28 2026',
    img:'https://www.clinique.com/media/export/cms/products/560x560/clq_EHA401_560x560_0.jpg',
    url:'https://www.ulta.com/brand/clinique' },

  { retailer:'Divi at Ulta', badge:'13% OFF',
    name:'Scalp Serum + Hair Vitamins Bundle',
    price:'13% off  ·  through April 4',
    img:'https://divihaircare.com/cdn/shop/products/Divi-ScalpSerum-PDP-Main.jpg?v=1677272003&width=560',
    url:'https://www.ulta.com/brand/divi' },

  { retailer:'Rare Beauty at Ulta', badge:'FREE GIFT',
    name:'Free Gift with Any 2 Rare Beauty Products',
    price:'While supplies last',
    img:'https://www.rarebeauty.com/cdn/shop/products/KindWordsMatteLipLiner_Grateful_Closed_PDP.jpg?v=1677272003&width=560',
    url:'https://www.ulta.com/brand/rare-beauty' },

  { retailer:'Ulta Beauty', badge:'EVENT',
    name:'21 Days of Beauty — 50% Off a New Brand Daily',
    price:'March 6 – 26  2026',
    img:'https://images.ulta.com/is/image/Ulta/21days-spring-2024-hero?w=560&h=560&fmt=jpg',
    url:'https://www.ulta.com/promotion/21-days-of-beauty' },
];

// Giraffe slides — real photos from image search
const GIRAFFES = [
  { img:'https://cdn2.500px.com/photo/138493667/640.jpg',
    msg:'A baby giraffe popped in to say\nyou are doing amazing 🦒' },
  { img:'https://www.zooborns.com/.a/6a010535647bf3970b017ee3a1c7d0970d-800wi',
    msg:'Tall graceful and completely adorable —\njust like you 🦒✨' },
  { img:'https://cdn2.500px.com/photo/116514953/640.jpg',
    msg:'This little giraffe sends you\nall its love 🦒💛' },
];

// Muskrat slides — real photos from image search
const MUSKRATS = [
  { img:'https://wildlife.illinois.gov/content/dam/soi/en/web/dnr/animals-and-plants/images/muskrat-laidlaw.jpg',
    msg:'A muskrat tried to sneak in.\nIt has been removed.' },
  { img:'https://www.covenantwilds.com/wp-content/uploads/muskrat-1024x683.jpg',
    msg:'Muskrats?\nNeed Not Apply.' },
];

// Build slide sequence — giraffes at slots 4, 9, 14 — muskrats at 7, 17
function buildSlides() {
  const slides = PRODUCTS.map(p => ({ type:'deal', data:p }));
  slides.splice(4,  0, { type:'giraffe', data:GIRAFFES[0] });
  slides.splice(9,  0, { type:'giraffe', data:GIRAFFES[1] });
  slides.splice(14, 0, { type:'giraffe', data:GIRAFFES[2] });
  slides.splice(7,  0, { type:'muskrat', data:MUSKRATS[0] });
  slides.splice(17, 0, { type:'muskrat', data:MUSKRATS[1] });
  return slides;
}

// Fallback tile if image fails — soft pink gradient
function fallbackStyle(el) {
  el.style.background = 'linear-gradient(140deg,#fdeef5,#fce0ea)';
}

function makeCard(slide) {
  const el = document.createElement('div');
  el.className = 'card hidden';

  if (slide.type === 'deal') {
    const d = slide.data;
    el.innerHTML =
      `<div class="prod-top">` +
        `<img src="${d.img}" alt="${d.name}" ` +
          `onerror="this.style.display='none';this.parentElement.innerHTML+='<div style=\\'display:flex;align-items:center;justify-content:center;height:100%;padding:24px;text-align:center;\\'><span style=\\'font-family:Cormorant Garamond,serif;font-size:1.4rem;color:#df7090;font-weight:300;\\'>${d.name}</span></div>'">` +
        `<span class="prod-badge">${d.badge}</span>` +
      `</div>` +
      `<div class="prod-body">` +
        `<div class="prod-retailer">${d.retailer}</div>` +
        `<div class="prod-name">${d.name}</div>` +
        `<div class="prod-row">` +
          `<span class="prod-price">${d.price}</span>` +
          `<a class="prod-link" href="${d.url}" target="_blank" rel="noopener noreferrer">Shop at Ulta →</a>` +
        `</div>` +
      `</div>`;

  } else if (slide.type === 'giraffe') {
    const d = slide.data;
    el.innerHTML =
      `<div class="giraffe-inner">` +
        `<img src="${d.img}" alt="cute giraffe" ` +
          `onerror="this.style.display='none'">` +
        `<div class="g-msg">${d.msg.replace(/\n/g,'<br>')}</div>` +
      `</div>`;

  } else {
    const d = slide.data;
    el.innerHTML =
      `<div class="muskrat-inner">` +
        `<img src="${d.img}" alt="muskrat" ` +
          `onerror="this.style.display='none'">` +
        `<div class="no-overlay">` +
          `<svg viewBox="0 0 200 200" fill="none">` +
            `<circle cx="100" cy="100" r="90" stroke="#e02030" stroke-width="14" opacity=".92"/>` +
            `<line x1="28" y1="28" x2="172" y2="172" stroke="#e02030" stroke-width="14" opacity=".92"/>` +
          `</svg>` +
        `</div>` +
        `<div class="m-msg">${d.msg.replace(/\n/g,'<br>')}</div>` +
        `<div class="m-nope">🚫 Need Not Apply 🚫</div>` +
      `</div>`;
  }
  return el;
}

const SLIDES = buildSlides();
let current = 0;
const stage  = document.getElementById('stage');
const dotsEl = document.getElementById('dots');
const ctr    = document.getElementById('counter');
const cards  = [];

SLIDES.forEach(s => {
  const c = makeCard(s);
  stage.appendChild(c);
  cards.push(c);
});
SLIDES.forEach(() => {
  const d = document.createElement('div');
  d.className = 'dot';
  dotsEl.appendChild(d);
});

function updateUI() {
  [...dotsEl.children].forEach((d,i) => d.classList.toggle('on', i===current));
  ctr.textContent = `${current+1} / ${SLIDES.length}`;
}
function go(dir) {
  const prev = current;
  current = (current+dir+SLIDES.length) % SLIDES.length;
  cards[prev].className = `card ${dir>0?'out-l':'out-r'}`;
  setTimeout(()=>{ if(cards[prev]) cards[prev].className='card hidden'; }, 450);
  cards[current].className='card active';
  updateUI();
}
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   go(-1);
});
let tx=0;
stage.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
stage.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>45) go(dx<0?1:-1);
},{passive:true});

// Show first card
cards[0].className='card active';
updateUI();
</script>
</body>
</html>
